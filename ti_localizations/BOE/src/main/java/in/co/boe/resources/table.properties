CREATE OR REPLACE VIEW ETTV_BOE_PAYMENT_DETAILS (PD_CIF_ID, PD_CIF_NAME, BENEF_NAME, BENEF_COUNTRY, PD_TXN_DT, PD_TXN_REF, PD_PART_PAY_REF, PD_TXN_CCY, PD_FC_AMT, PD_ENDORSED_AMT, PD_OUTSTANDING_AMT, PD_EXG_RATE, PD_BASE_AMT, PD_IE_CODE, PD_PRD_CODE, PD_PRD_NAME, PD_PRD_TYPE, PD_EVE_CODE, PD_EVE_NEME, MAS_KEY, EVE_KEY) AS 
  SELECT 
  ECUS.CUST            AS PD_CIF_ID,
  PAD1.ADDRESS1                  AS PD_CIF_NAME,
  PAD2.ADDRESS1                  AS BENEF_NAME,
  PAD2.COUNTRY                   AS BENEF_COUNTRY,
  BEV.START_DATE                   AS PD_TXN_DT,
  MAS.MASTER_REF                 AS PD_TXN_REF,
  BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0) AS PD_PART_PAY_REF,
  PAP.PAY_AMTCCY                        AS PD_TXN_CCY,
  PAP.PAY_AMT/power(10,C82.C8CED)                     AS PD_FC_AMT,
  --(SELECT BOE_PAYMENT_BP_BOE_TYPE FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF) = TRIM(MAS.MASTER_REF)) AS PD_BOE_TYPE,
  (SELECT SUM(NVL(BOE_PAYMENT_BP_PAY_ENDORSE_AMT, 0)) FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF) = TRIM(MAS.MASTER_REF) AND  TRIM(BOE_PAYMENT_BP_PAY_PART_REF)=BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0)) AS PD_ENDORSED_AMT,
  (SELECT (PAP.PAY_AMT/power(10,C82.C8CED)) - SUM(NVL(BOE_PAYMENT_BP_PAY_ENDORSE_AMT,0)) FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF)=TRIM(MAS.MASTER_REF)  AND  TRIM(BOE_PAYMENT_BP_PAY_PART_REF)=BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0)) AS PD_OUTSTANDING_AMT,
  EXRATE.SPOTRATE                AS PD_EXG_RATE,
  (PAP.PAY_AMT * EXRATE.SPOTRATE)/power(10,C82.C8CED) AS PD_BASE_AMT,
  ecus.iecode                    AS PD_IE_CODE,
  PRD.CODE79                     AS PD_PRD_CODE,
  PRD.LONGNA85                   AS PD_PRD_NAME,
   PRT.DESCRIP                    AS PD_PRD_TYPE,
  EVE.CODE79                     AS PD_EVE_CODE,
  EVE.LONGNA85                   AS PD_EVE_NEME,
  MAS.KEY97                      AS MAS_KEY,
  BEV.KEY97                      AS EVE_KEY
FROM MASTER MAS,
  PARTYDTLS PAD1,
  PARTYDTLS PAD2,
  BASEEVENT BEV,
  EXEMPL30 EVE,
  SPOTRATE EXRATE,
  exempl30 PRD,
  extcust ecus,
  GFPF G1,
  C8PF C82,
  PRODTYPE PRT,
  LCPAYMENT LCP,
  LCMASTER LC,
  PARTPAYMNT PAP
  WHERE 
  MAS.KEY97 = LC.KEY97
  AND LC.APP_PTY = PAD1.KEY97
  AND LC.BEN_PTY = PAD2.KEY97
--IMPORT LC - OUTSTANDING CLAIM -- APPLICANT IS CUSTOMER
--OUTWARD CUSTOMER REMITTANCE - REMITTER IS CUSTOMER
  AND MAS.KEY97        = BEV.MASTER_KEY
  AND BEV.EXEMPLAR     = EVE.KEY97
  AND MAS.EXEMPLAR     = PRD.KEY97
  AND BEV.KEY97 = LCP.KEY97
  AND LCP.KEY97     = PAP.PAYEV_KEY
  AND PAP.PAY_AMTCCY    = EXRATE.CURRENCY
  AND PRD.CODE79 = 'ILC'
  AND EVE.CODE79 ='POC'
  AND BEV.STATUS IN ('i','c')
  AND TRIM(pad1.cus_mnm)= TRIM(G1.GFCUS1)
  AND TRIM(PAD1.CUS_SBB)=TRIM(G1.GFCUS1_SBB)
  AND MAS.PRODTYPE = PRT.KEY97
  AND TRIM(G1.GFCUS1)=TRIM(ECUS.CUST)
  AND TRIM(G1.GFCUS1_SBB)=TRIM(ECUS.CUST_SBB)
  AND trim(BEV.CCY) = trim(C82.C8CCY )
  UNION ALL
  SELECT 
  ECUS.CUST            AS PD_CIF_ID,
  PAD1.ADDRESS1                  AS PD_CIF_NAME,
  PAD2.ADDRESS1                  AS BENEF_NAME,
  PAD2.COUNTRY                   AS BENEF_COUNTRY,
  BEV.START_DATE                   AS PD_TXN_DT,
  MAS.MASTER_REF                 AS PD_TXN_REF,
  BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0) AS PD_PART_PAY_REF,
  CPM.PAY_CCY                       AS PD_TXN_CCY,
  CPM.PAY_AMT/power(10,C82.C8CED)                     AS PD_FC_AMT,
  --(SELECT BOE_PAYMENT_BP_BOE_TYPE FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF) = TRIM(MAS.MASTER_REF)) AS PD_BOE_TYPE,
  (SELECT SUM(NVL(BOE_PAYMENT_BP_PAY_ENDORSE_AMT, 0)) FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF) = TRIM(MAS.MASTER_REF) AND  TRIM(BOE_PAYMENT_BP_PAY_PART_REF)=BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0)) AS PD_ENDORSED_AMT,
  (SELECT (CPM.PAY_AMT/power(10,C82.C8CED)) - SUM(NVL(BOE_PAYMENT_BP_PAY_ENDORSE_AMT,0)) FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF)=TRIM(MAS.MASTER_REF)  AND  TRIM(BOE_PAYMENT_BP_PAY_PART_REF)=BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0)) AS PD_OUTSTANDING_AMT,
  EXRATE.SPOTRATE                AS PD_EXG_RATE,
  (CPM.PAY_AMT * EXRATE.SPOTRATE)/power(10,C82.C8CED) AS PD_BASE_AMT,
  ecus.iecode                    AS PD_IE_CODE,
  PRD.CODE79                     AS PD_PRD_CODE,
  PRD.LONGNA85                   AS PD_PRD_NAME,
  PRT.DESCRIP                    AS PD_PRD_TYPE,
  EVE.CODE79                     AS PD_EVE_CODE,
  EVE.LONGNA85                   AS PD_EVE_NEME,
  MAS.KEY97                      AS MAS_KEY,
  BEV.KEY97                      AS EVE_KEY
  FROM MASTER MAS,
  PARTYDTLS PAD1,
  PARTYDTLS PAD2,
  BASEEVENT BEV,
  EXEMPL30 EVE,
  SPOTRATE EXRATE,
  exempl30 PRD,
  extcust ecus,
  GFPF G1,
  C8PF C82,
  PRODTYPE PRT,
  CPAYMASTER CPM,
  tidataitem T
  WHERE 
--IMPORT LC - OUTSTANDING CLAIM -- APPLICANT IS CUSTOMER
--OUTWARD CUSTOMER REMITTANCE - REMITTER IS CUSTOMER
MAS.KEY97 = CPM.KEY97
AND MAS.key97 = t.master_key
AND T.KEY97 = PAD2.KEY97
AND PAD2.ROLE = 'BEN'
AND MAS.KEY97 = BEV.MASTER_KEY
AND CPM.REMIT_PTY = PAD1.KEY97
AND BEV.EXEMPLAR     = EVE.KEY97
AND MAS.EXEMPLAR     = PRD.KEY97
AND CPM.PAY_CCY          = EXRATE.CURRENCY
AND PRD.CODE79 ='CPCO'
AND EVE.CODE79 ='PCOC'
AND BEV.STATUS IN ('i','c')
AND TRIM(pad1.cus_mnm)= TRIM(G1.GFCUS1)
AND TRIM(PAD1.CUS_SBB)=TRIM(G1.GFCUS1_SBB)
AND MAS.PRODTYPE = PRT.KEY97
AND TRIM(G1.GFCUS1)=TRIM(ECUS.CUST)
AND TRIM(G1.GFCUS1_SBB)=TRIM(ECUS.CUST_SBB)
AND trim(BEV.CCY) = trim(C82.C8CCY )
UNION ALL
SELECT 
  ECUS.CUST            AS PD_CIF_ID,
  PAD1.ADDRESS1                  AS PD_CIF_NAME,
  PAD2.ADDRESS1                  AS BENEF_NAME,
  PAD2.COUNTRY                   AS BENEF_COUNTRY,
  BEV.START_DATE                   AS PD_TXN_DT,
  MAS.MASTER_REF                 AS PD_TXN_REF,
  BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0) AS PD_PART_PAY_REF,
  BEV.CCY                        AS PD_TXN_CCY,
  BEV.AMOUNT/power(10,C82.C8CED)                     AS PD_FC_AMT,
  --(SELECT BOE_PAYMENT_BP_BOE_TYPE FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF) = TRIM(MAS.MASTER_REF)) AS PD_BOE_TYPE,
(SELECT SUM(NVL(BOE_PAYMENT_BP_PAY_EDS_FC_AMT, 0)) FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF) = TRIM(MAS.MASTER_REF) AND  TRIM(BOE_PAYMENT_BP_PAY_PART_REF)=BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0)) AS PD_ENDORSED_AMT,
  (SELECT (BEV.AMOUNT/power(10,C82.C8CED)) - SUM(NVL(BOE_PAYMENT_BP_PAY_EDS_FC_AMT,0)) FROM ETT_BOE_PAYMENT WHERE TRIM(BOE_PAYMENT_BP_PAY_REF)=TRIM(MAS.MASTER_REF)
  AND  TRIM(BOE_PAYMENT_BP_PAY_PART_REF)=BEV.REFNO_PFIX||lPAD(BEV.REFNO_SERL,3,0)) AS PD_OUTSTANDING_AMT,
EXRATE.SPOTRATE                AS PD_EXG_RATE,
(BEV.AMOUNT * EXRATE.SPOTRATE)/power(10,C82.C8CED) AS PD_BASE_AMT,
  ecus.iecode                    AS PD_IE_CODE,
  PRD.CODE79                     AS PD_PRD_CODE,
  PRD.LONGNA85                   AS PD_PRD_NAME,
  PRT.DESCRIP                    AS PD_PRD_TYPE,
  EVE.CODE79                     AS PD_EVE_CODE,
  EVE.LONGNA85                   AS PD_EVE_NEME,
  MAS.KEY97                      AS MAS_KEY,
  BEV.KEY97                      AS EVE_KEY
FROM MASTER MAS,
  PARTYDTLS PAD1,
  PARTYDTLS PAD2,
  BASEEVENT BEV,
  EXEMPL30 EVE,
  SPOTRATE EXRATE,
  exempl30 PRD,
  extcust ecus,
  GFPF G1,
  C8PF C82,
  PRODTYPE PRT,
  COLLMASTER COL
  WHERE
 MAS.KEY97 = COL.KEY97
AND COL.DRAWEE_PTY  = PAD1.KEY97
AND COL.DRAWER_PTY = PAD2.KEY97
---INWARD DOCUMENTARY COLLECTION - PAYMENT - DRAWEE IS CUSTOMER
AND MAS.KEY97        = BEV.MASTER_KEY
AND BEV.EXEMPLAR     = EVE.KEY97
AND MAS.EXEMPLAR     = PRD.KEY97
AND BEV.CCY          = EXRATE.CURRENCY
AND PRD.CODE79 ='IDC'
AND EVE.CODE79 ='CRE'
--AND EVE.CODE79 ='CLP'
AND BEV.STATUS IN ('i','c')
AND TRIM(pad1.cus_mnm)= TRIM(G1.GFCUS1)
AND TRIM(PAD1.CUS_SBB)=TRIM(G1.GFCUS1_SBB)
AND MAS.PRODTYPE = PRT.KEY97
AND TRIM(G1.GFCUS1)=TRIM(ECUS.CUST)
AND TRIM(G1.GFCUS1_SBB)=TRIM(ECUS.CUST_SBB)
AND trim(BEV.CCY) = trim(C82.C8CCY );
------------------------------------------------------------------------------------------------------------------------------------------------------------------------
