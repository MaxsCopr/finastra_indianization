   create or replace 
procedure ett_invoice_calc_insert (alloc_amt IN varchar2,boe_alloc_amt in VARCHAR2, total_amt in VARCHAR2, boe in varchar2, boe_date in varchar2) AS 
cursor c1 IS 
select 
invoice_serial_number as invoice_serial, 
invoice_number as invoice_no, 
invoice_fobamount as invoice_amt,
boe_number as boe_no,
boe_date as boe_date
from ett_invoice_details where boe_number=boe and boe_date = TO_DATE(TO_CHAR(boe_date,'DD-MM-YY'),'DD-MM-YY');
 
INV DECIMAL(15,2);
BILL DECIMAL(15,2);
TOTAL_BILL DECIMAL(15,2);
REALAMT DECIMAL(15,2);
REALAMT2 DECIMAL(15,2);
 
begin
  --DBMS_OUTPUT_LINE('--- '||REC1.INVOICE_AMT);
for rec1 in c1 loop 
  INV := TO_NUMBER (rec1.invoice_amt);
  dbms_output.put_line('product_code - '||INV);
  --BILL:=
  REALAMT:=(INV*TO_NUMBER(alloc_amt))/TO_NUMBER(total_amt);
  REALAMT2:=(INV*TO_NUMBER(boe_alloc_amt))/TO_NUMBER(total_amt);
  dbms_output.put_line('product_code2 - '||REALAMT);
  --update ett_boe_inv_payment set real_amt=REALAMT,real_orm_amt=REALAMT where boe_no=rec1.boe_no and inv_sno=rec1.invoice_serial and inv_no=rec1.invoice_no;
  INSERT INTO ett_boe_inv_payment(INV_SNO,INV_NO,INV_AMT,REAL_AMT,real_orm_amt,BOE_NO,boe_date) VALUES(rec1.invoice_serial,rec1.invoice_no,rec1.invoice_amt,REALAMT,REALAMT2,rec1.boe_no,TO_DATE(TO_CHAR(rec1.boe_date,'DD-MM-YY'),'DD-MM-YY'));
end loop;
end;
